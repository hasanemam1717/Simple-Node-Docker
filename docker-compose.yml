version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: node-docker-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - APP_NAME=Node-Docker-Compose
      - PORT=3000
    # For local dev, mount the source so changes reflect immediately
    volumes:
      - ./app.js:/usr/src/app/app.js
    restart: unless-stopped
